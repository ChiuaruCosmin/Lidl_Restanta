<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>UnD - Unemployment Data Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>UnD - Unemployment Data Visualizer</h1>
    <p>Vizualizare date publice despre somajul din Romania</p>

    <div class="card">
        <h2>Filtre</h2>

        <div class="filters">
            <div>
                <label for="judetSelect">Judet:</label>
                <select id="judetSelect">
                    <option value="">Toate judetele</option>
                </select>
            </div>

            <div>
                <label for="lunaStart">Luna inceput:</label>
                <input type="month" id="lunaStart">
            </div>

            <div>
                <label for="lunaEnd">Luna final:</label>
                <input type="month" id="lunaEnd">
            </div>

            <button id="filterButton">Aplica filtre</button>
        </div>
    </div>

    <div class="card">
        <h2>Rezultate</h2>

        <table>
            <thead>
                <tr>
                    <th>Judet</th>
                    <th>Luna</th>
                    <th>Total someri</th>
                    <th>Femei</th>
                    <th>Barbati</th>
                    <th>Rata somajului (%)</th>
                </tr>
            </thead>
            <tbody id="dataBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
