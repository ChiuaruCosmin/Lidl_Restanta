<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>UnD - Unemployment Data Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
    <h1>UnD - Unemployment Data Visualizer</h1>
    <p>Vizualizare date despre somajul din Romania</p>

    <div class="card">
        <label for="judetSelect">Alege judet:</label>

        <select id="judetSelect">
            <option value="">Toate judetele</option>
        </select>

        <button onclick="loadData()">Afiseaza date</button>
    </div>

    <div class="card">
        <h2>Rezultate</h2>

        <table>
            <thead>
                <tr>
                    <th>Judet</th>
                    <th>Luna</th>
                    <th>Rata somajului (%)</th>
                </tr>
            </thead>
            <tbody id="dataBody">
            </tbody>
        </table>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
