<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - UnD</title>
    <link rel="stylesheet" href="../public/css/style.css">
    <style>
        .login-box {
            max-width: 360px;
            margin: 80px auto;
            padding: 30px;
            border: 1px solid #dddddd;
            background: #fff;
        }
        .login-box h2 { margin-top: 0; }
        .login-box label { display: block; margin-bottom: 4px; font-size: 14px; }
        .login-box input[type="text"],
        .login-box input[type="password"] {
            width: 100%;
            padding: 8px;
            font-size: 14px;
            margin-bottom: 14px;
            box-sizing: border-box;
            border: 1px solid #ddd;
        }
        .login-box button { width: 100%; }
        .eroare { color: #c00; font-size: 14px; margin-bottom: 12px; display: none; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Admin - UnD</h2>
    <p class="eroare" id="eroare"></p>
    <form id="loginForm">
        <label for="user">Utilizator:</label>
        <input type="text" id="user" autocomplete="off">
        <label for="pass">Parola:</label>
        <input type="password" id="pass">
        <button type="submit">Autentificare</button>
    </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var user = document.getElementById('user').value;
    var pass = document.getElementById('pass').value;
    var eroare = document.getElementById('eroare');
    eroare.style.display = 'none';

    fetch('../api/admin_login.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'user=' + encodeURIComponent(user) + '&pass=' + encodeURIComponent(pass)
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            window.location.href = 'dashboard.html';
        } else {
            eroare.textContent = data.error || 'Date incorecte.';
            eroare.style.display = 'block';
        }
    })
    .catch(function() {
        eroare.textContent = 'Eroare de conexiune.';
        eroare.style.display = 'block';
    });
});
</script>
</body>
</html>
